# Tréninkový plán pro výroční tělesné přezkoušení (VTP) — muži, 12 týdnů
# Zdroj: https://doarmady.mo.gov.cz/priprava/vyrocni-telesne-prezkouseni/treninkovy-plan-pro-vyrocni-telesne-prezkouseni/muzi
# Strojově čitelný přepis pro zpracování do Garmin Connect (viz docs/implementacni-plan.md)
#
# Konvence:
#   typ: silovy | beh | kombinace | volno | aktivni_odpocinek | kontrolni_test
#   cviky: klíče cviků viz docs/garmin-mapovani-cviku.md
#   serie "3-5" = rozsah, cíl dle pocitu; kola = počet kol celého tréninku
#   SFmax = maximální srdeční frekvence

meta:
  nazev: "VTP 12týdenní plán (muži)"
  zdroj: "https://doarmady.mo.gov.cz/priprava/vyrocni-telesne-prezkouseni/treninkovy-plan-pro-vyrocni-telesne-prezkouseni/muzi"
  pocet_tydnu: 12
  start_datum: null   # doplnit pondělí 1. týdne (YYYY-MM-DD), nebo použít --start
  konvence_nazvu: "VTP-T{TT}-{DEN}-{TYP}"

testy_minima:   # doporučená minima po kontrolních testech (neděle daného týdne)
  - { po_tydnu: 2,  beh_12min_m: 2200, lehsedy_1min: 28, kliky_30s: 15 }
  - { po_tydnu: 4,  beh_12min_m: 2400, lehsedy_1min: 33, kliky_30s: 19, skok_daleky_cm: 182 }
  - { po_tydnu: 6,  beh_12min_m: 2600, lehsedy_1min: 38, kliky_30s: 23 }
  - { po_tydnu: 8,  beh_12min_m: 2800, lehsedy_1min: 43, kliky_30s: 26 }
  - { po_tydnu: 10, beh_12min_m: 2900, lehsedy_1min: 48, kliky_30s: 29 }
  - { po_tydnu: 12, beh_12min_m: 3000, lehsedy_1min: 52, kliky_30s: 32 }

tydny:
  - tyden: 1
    dny:
      po:
        typ: silovy
        poznamka: "pauza = aktivní odpočinek, např. chůze"
        kola: "1-2"
        pauza_mezi_koly_s: 180
        cviky:
          - { cvik: plank_vydrz, cas_s: 30, serie: 5, pauza_s: 60 }
          - { cvik: drep, opakovani: 10, serie: 3, pauza_s: 30 }
          - { cvik: nuzky_vleze, cas_s: 20, serie: 3, pauza_s: 60, popis: "leh na zádech, nohy těsně nad zemí" }
      ut:
        typ: beh
        podtyp: indiansky_beh
        kroky:
          - { krok: rozklusani, cas_min: 10, poznamka: "dynamický strečink" }
          - krok: opakovat
            pocet: 10
            obsah:
              - { krok: chuze, cas_s: 30 }
              - { krok: beh, cas_s: 90 }
          - { krok: vyklus, cas_min: 10 }
      st: { typ: volno }
      ct: { typ: volno }
      pa:
        typ: silovy
        kola: "1-2"
        pauza_mezi_koly_s: 180
        cviky:
          - { cvik: klik_negativni, opakovani: 5, serie: 5, pauza_s: 60, popis: "3-5 s brzdit do lehu" }
          - { cvik: vyskok_z_podrepu, opakovani: 5, serie: 6, pauza_s: 60 }
          - { cvik: leh_sed, opakovani: 8, serie: 5, pauza_s: 60, popis: "natažené nohy" }
      so:
        typ: beh
        kroky:
          - { krok: rozklusani, cas_min: 15, poznamka: "rozklusání/chůze, dynamický strečink" }
          - { krok: beh, cas_min: 12, popis: "souvislý běh" }
          - { krok: vyklus, cas_min: 15, poznamka: "výklus/chůze" }
      ne: { typ: volno }

  - tyden: 2
    dny:
      po:
        typ: silovy
        poznamka: "pauza = aktivní odpočinek, např. chůze"
        kola: "1-2"
        pauza_mezi_koly_s: 180
        cviky:
          - { cvik: klik_na_kolenou, opakovani: 10, serie: "3-5", pauza_s: 60 }
          - { cvik: vyskok_na_bednu, opakovani: 5, serie: "3-5", pauza_s: 60, popis: "výskok/seskok, bedna 30-50 cm" }
          - { cvik: leh_sed, opakovani: 11, serie: "3-5", pauza_s: 60 }
          - { cvik: anglicak, opakovani: 5, serie: "3-5", pauza_s: 60 }
      ut:
        typ: beh
        podtyp: indiansky_beh
        kroky:
          - { krok: beh, cas_min: 40, popis: "indiánský běh (střídání chůze a běhu)" }
      st: { typ: volno }
      ct:
        typ: silovy
        kola: "1-2"
        pauza_mezi_koly_s: 180
        cviky:
          - { cvik: klik_na_kolenou, opakovani: 10, serie: "3-5", pauza_s: 60, popis: "před každou sérií 10 s výdrž ve vzporu ležmo" }
          - { cvik: drep_do_vyponu, opakovani: 10, serie: 3, pauza_s: 30 }
          - { cvik: rotace_trupu_vsede, opakovani: 10, serie: "3-5", pauza_s: 60 }
          - { cvik: anglicak, opakovani: 3, serie: "3-5", pauza_s: 30 }
      pa:
        typ: beh
        kroky:
          - { krok: rozklusani, cas_min: 10, poznamka: "běžecká ABECEDA, dynamické protažení" }
          - krok: opakovat
            pocet: 10
            obsah:
              - { krok: beh, cas_s: 60, cil: "85 % max" }
              - { krok: klus, cas_s: 60, popis: "volně klus/chůze" }
          - { krok: vyklus, cas_min: 10 }
      so: { typ: volno }
      ne:
        typ: kontrolni_test
        popis: "12min běh + max leh-sedy za 1 min + max kliky za 30 s"
        minima: { beh_12min_m: 2200, lehsedy_1min: 28, kliky_30s: 15 }

  - tyden: 3
    dny:
      po:
        typ: silovy
        poznamka: "pauza = aktivní odpočinek, např. chůze"
        kola: "1-2"
        pauza_mezi_koly_s: 180
        cviky:
          - { cvik: klik, opakovani: 10, serie: "3-5", pauza_s: 60 }
          - { cvik: vypad, opakovani: 10, serie: "3-5", pauza_s: 60 }
          - { cvik: leh_sed, cas_s: 30, serie: "3-5", pauza_s: 120, popis: "max opakování za 30 s" }
          - { cvik: anglicak, opakovani: 5, serie: "3-5", pauza_s: 60 }
      ut:
        typ: beh
        kroky:
          - { krok: rozklusani, cas_min: 10 }
          - { krok: beh, cas_min: 20, cil: "60-70 % SFmax", popis: "souvislý běh" }
          - { krok: vyklus, cas_min: 10 }
      st: { typ: volno }
      ct: { typ: volno }
      pa:
        typ: silovy
        kola: 1
        cviky:
          - { cvik: klik, opakovani: 15, serie: "3-5", pauza_s: 60 }
          - { cvik: zabak, opakovani: 5, serie: "3-5", pauza_s: 60 }
          - { cvik: veslovani_vsede, cas_s: 20, serie: "3-5", pauza_s: 60 }
          - { cvik: anglicak, opakovani: 5, serie: "3-5", pauza_s: 60 }
      so:
        typ: beh
        kroky:
          - { krok: rozklusani, cas_min: 10 }
          - krok: opakovat
            pocet: 5
            obsah:
              - { krok: beh, cas_min: 2, cil: "85 % SFmax" }
              - { krok: pauza, cas_min: 2 }
          - { krok: vyklus, cas_min: 10 }
      ne: { typ: volno }

  - tyden: 4
    dny:
      po:
        typ: silovy
        poznamka: "pauza = aktivní odpočinek, např. chůze"
        kola: "1-2"
        pauza_mezi_koly_s: 180
        cviky:
          - { cvik: klik, cas_s: 30, serie: "3-5", pauza_s: 120, popis: "max opakování za 30 s" }
          - { cvik: zabak, opakovani: 3, serie: 5, pauza_s: 120, popis: "max úsilí" }
          - { cvik: leh_sed, cas_s: 60, serie: "3-5", pauza_s: 120, popis: "max opakování za 1 min" }
          - { cvik: anglicak, opakovani: 7, serie: "3-5", pauza_s: 60 }
      ut:
        typ: beh
        kroky:
          - { krok: rozklusani, cas_min: 10 }
          - krok: opakovat
            pocet: 6
            obsah:
              - { krok: beh, cas_s: 50, popis: "běh do kopce" }
              - { krok: pauza, cas_min: 2, popis: "sejít dolů" }
          - { krok: vyklus, cas_min: 15 }
      st: { typ: volno }
      ct:
        typ: silovy
        podtyp: kruhovy
        kola: "2-3"
        pauza_mezi_koly_s: 180
        cviky:
          - { cvik: klik, cas_s: 30, pauza_s: 60, popis: "max opakování za 30 s" }
          - { cvik: zabak, opakovani: 3, pauza_s: 60, popis: "max úsilí" }
          - { cvik: leh_sed, cas_s: 60, pauza_s: 60, popis: "max opakování za 1 min" }
          - { cvik: anglicak, opakovani: 8, pauza_s: 60 }
      pa:
        typ: beh
        kroky:
          - { krok: rozklusani, cas_min: 15, poznamka: "běžecká ABECEDA, dynamické protažení" }
          - krok: opakovat
            pocet: 10
            obsah:
              - { krok: beh, cas_s: 20, cil: "90 % max rychlosti" }
              - { krok: klus, cas_s: 60, popis: "volný klus/chůze" }
          - { krok: vyklus, cas_min: 15 }
      so: { typ: volno }
      ne:
        typ: kontrolni_test
        popis: "12min běh + leh-sedy + kliky + skok daleký z místa"
        minima: { beh_12min_m: 2400, lehsedy_1min: 33, kliky_30s: 19, skok_daleky_cm: 182 }

  - tyden: 5
    dny:
      po:
        typ: beh
        kroky:
          - { krok: rozklusani, cas_min: 10 }
          - { krok: beh, cas_min: 30, cil: "75 % SFmax", popis: "souvislý běh" }
          - { krok: vyklus, cas_min: 10 }
      ut:
        typ: silovy
        kola: 1
        cviky:
          - { cvik: klik, opakovani: 21, serie: 3, pauza_s: 60, popis: "střídat užší/základní/širší úchop" }
          - { cvik: chuze_do_vypadu, opakovani: 12, serie: 4, pauza_s: 20 }
          - { cvik: veslovani_vsede, cas_s: 30, serie: 4, pauza_s: 60 }
          - { cvik: panak, cas_min: 1 }
      st: { typ: aktivni_odpocinek, popis: "např. turistika, kolo, plavání" }
      ct: { typ: volno }
      pa:
        typ: beh
        podtyp: fartlek
        poznamka: "R = rychlejší běh, V = volný klus, úseky v minutách"
        kroky:
          - { krok: rozklusani, cas_min: 10 }
          - { krok: beh, popis: "3R 2V, 2R 3V, 4R 1V, 1R 4V (minuty)" }
          - { krok: vyklus, cas_min: 10 }
      so:
        typ: silovy
        podtyp: kruhovy
        kola: "3-5"
        pauza_mezi_koly_s: 120
        cviky:
          - { cvik: klik, popis: "max opakování (min. 10)", pauza_s: 60 }
          - { cvik: drep_s_vyskokem, opakovani: 10, pauza_s: 60 }
          - { cvik: leh_sed, popis: "max opakování (min. 20)", pauza_s: 60 }
      ne: { typ: aktivni_odpocinek, popis: "např. turistika, kolo, plavání" }

  - tyden: 6
    dny:
      po: { typ: volno }
      ut:
        typ: beh
        kroky:
          - { krok: beh, cas_min: 45, popis: "souvislý běh" }
      st:
        typ: silovy
        kola: "3-4"
        pauza_mezi_koly_s: 240
        kroky_pred: "10 min rozcvičení: zahřátí, dynamické protažení, kroužení ve velkých kloubech"
        cviky:
          - { cvik: klik, cas_s: 30, pauza_s: 120, popis: "max úsilí" }
          - { cvik: leh_sed, cas_s: 60, popis: "max úsilí" }
      ct:
        typ: beh
        kroky:
          - { krok: rozklusani, cas_min: 10 }
          - krok: opakovat
            pocet: 6
            obsah:
              - { krok: usek, vzdalenost_m: 400, cil: "tempo 90 s/kolo" }
              - { krok: pauza, cas_min: 2 }
          - { krok: vyklus, cas_min: 10 }
      pa: { typ: aktivni_odpocinek, popis: "např. turistika, kolo, plavání" }
      so: { typ: volno }
      ne:
        typ: kontrolni_test
        minima: { beh_12min_m: 2600, lehsedy_1min: 38, kliky_30s: 23 }

  - tyden: 7
    dny:
      po:
        typ: beh
        kroky:
          - { krok: beh, cas_min: 30, popis: "volný běh" }
      ut:
        typ: silovy
        kola: "1-2"
        pauza_mezi_koly_s: 180
        cviky:
          - { cvik: klik_hand_release, opakovani: 15, serie: "3-5", pauza_s: 60, popis: "klik do lehu a zvednout dlaně" }
          - { cvik: nuzky_vleze, cas_s: 20, serie: "3-4", pauza_s: 60, popis: "+ 20 s přednožit, rukama dotyk špiček" }
          - { cvik: anglicak, opakovani: 10, serie: 2, pauza_s: 60 }
          - { cvik: panak, cas_min: 1 }
          - { cvik: vis_pasivni, cas_min: 1, popis: "nasčítat celkem 1 min ve visu" }
      st: { typ: aktivni_odpocinek, popis: "např. turistika, kolo, plavání" }
      ct: { typ: volno }
      pa:
        typ: beh
        kroky:
          - { krok: rozklusani, cas_min: 10 }
          - krok: opakovat
            pocet: 4
            obsah:
              - { krok: usek, vzdalenost_m: 1000, cil: "tempo 4:20-4:30/km" }
              - { krok: pauza, cas_min: 3, popis: "nebo do poklesu SF na 120 tep/min" }
          - { krok: vyklus, cas_min: 10 }
      so:
        typ: kombinace
        popis: "běh + silový trénink, 1 kolo"
        bloky:
          - { cvik: sklapovacky_plus_klik, popis: "15x sklapovačky + 20x klik", serie: "3-5", pauza_s: 60 }
          - { krok: beh, vzdalenost_km: "2-3", popis: "volný běh" }
          - { cvik: sklapovacky_plus_klik, popis: "15x sklapovačky + 20x klik", serie: "3-5", pauza_s: 60 }
      ne: { typ: aktivni_odpocinek, popis: "např. turistika, kolo, plavání" }

  - tyden: 8
    dny:
      po: { typ: volno }
      ut:
        typ: beh
        kroky:
          - { krok: beh, cas_min: 30, popis: "souvislý běh" }
      st:
        typ: silovy
        kola: "3-4"
        pauza_mezi_koly_s: 240
        kroky_pred: "10 min rozcvičení: zahřátí, dynamické protažení, kroužení ve velkých kloubech"
        cviky:
          - { cvik: klik, cas_s: 30, pauza_s: 120, popis: "max úsilí" }
          - { cvik: leh_sed, cas_s: 60, popis: "max úsilí" }
      ct:
        typ: beh
        podtyp: pyramida
        kroky:
          - { krok: rozklusani, cas_min: 10 }
          - { krok: pyramida, useky_m: [50, 100, 200, 400, 800, 1600, 800, 400, 200, 100, 50], cil: "75 % SFmax", pauza: "1:1 (pauza = délka úseku)" }
          - { krok: vyklus, cas_min: 10 }
      pa: { typ: aktivni_odpocinek, popis: "např. turistika, kolo, plavání" }
      so: { typ: volno }
      ne:
        typ: kontrolni_test
        minima: { beh_12min_m: 2800, lehsedy_1min: 43, kliky_30s: 26 }

  - tyden: 9
    dny:
      po:
        typ: beh
        kroky:
          - { krok: rozklusani, cas_min: 10, poznamka: "ABECEDA, dynamické protažení" }
          - { krok: beh, cas_min: 35, popis: "volný běh" }
          - { krok: vyklus, cas_min: 10 }
      ut:
        typ: silovy
        podtyp: kruhovy_tabata
        rezim: "20 s zátěž / 10 s pauza"
        kola: "1-2"
        pauza_mezi_koly_s: 180
        cviky:
          - { cvik: leh_sed }
          - { cvik: klik, popis: "na šíři ramen" }
          - { cvik: jizda_na_kole_vsede, popis: "sed, ruce v týl, nohy nad zemí, lokty dotyk kolene" }
          - { cvik: klik_diamant, popis: "dlaně na úzko" }
          - { cvik: sklapovacky }
          - { cvik: klik_siroky, popis: "dlaně šíř než ramena" }
          - { cvik: rotace_trupu_vsede, popis: "nohy pokrčené nad zemí, rotace do stran" }
          - { cvik: klik_hand_release, popis: "klik do lehu a odlepení dlaní" }
        po_treninku:
          - { cvik: extenze_zad, opakovani: 7, serie: 4, pauza_s: 10, popis: "leh na břiše, zvednout ruce a nohy" }
      st: { typ: aktivni_odpocinek, popis: "např. turistika, kolo, plavání" }
      ct: { typ: volno }
      pa:
        typ: beh
        kroky:
          - { krok: rozklusani, cas_min: 15, poznamka: "ABECEDA, dynamické protažení" }
          - krok: opakovat
            pocet: 2
            pauza_mezi_s: 300
            obsah:
              - krok: opakovat
                pocet: 10
                obsah:
                  - { krok: usek, vzdalenost_m: 100, cil: "90 % max úsilí" }
                  - { krok: klus, popis: "výklus zpět na start" }
          - { krok: vyklus, cas_min: 15 }
      so:
        typ: silovy
        kola: "3-5"
        pauza_mezi_koly_s: 60
        cviky:
          - { cvik: plank_plus_lehsed, popis: "30 s plank + 30 s leh-sed", pauza_s: 60 }
          - { cvik: plank_na_boku, popis: "15 s pravá / 15 s levá + 30 s kmity vlevo/vpravo s dotykem kotníků" }
        po_treninku:
          - { cvik: klik_tleskaci, opakovani: 7, serie: 5, pauza_s: 60, popis: "klik s odrazem a tlesknutím" }
      ne: { typ: aktivni_odpocinek, popis: "např. turistika, kolo, plavání" }

  - tyden: 10
    dny:
      po: { typ: volno }
      ut:
        typ: beh
        kroky:
          - { krok: rozklusani, poznamka: "ABECEDA, dynamické protažení" }
          - krok: opakovat
            pocet: 6
            obsah:
              - { krok: usek, vzdalenost_m: 500, cil: "max do 1:50" }
              - { krok: pauza, cas_s: 150 }
          - { krok: vyklus, cas_min: 10 }
      st:
        typ: silovy
        podtyp: sestupna_pyramida
        kroky_pred: "10 min rozcvičení: zahřátí, dynamické protažení, kroužení ve velkých kloubech"
        bloky:
          - cvik: leh_sed
            popis: "max úsilí: 70 s - pauza 3 min - 50 s - pauza 2 min - 30 s - pauza 1 min - 10 s"
          - { krok: pauza, cas_min: 5 }
          - cvik: klik
            popis: "max úsilí: 40 s - pauza 3 min - 30 s - pauza 2 min - 20 s - pauza 1 min - 10 s"
      ct:
        typ: beh
        kroky:
          - { krok: rozklusani, cas_min: 10, poznamka: "ABECEDA, dynamické protažení" }
          - { krok: beh, cas_min: 35, popis: "volný běh" }
          - { krok: vyklus, cas_min: 10 }
      pa: { typ: aktivni_odpocinek, popis: "např. turistika, kolo, plavání" }
      so: { typ: volno }
      ne:
        typ: kontrolni_test
        minima: { beh_12min_m: 2900, lehsedy_1min: 48, kliky_30s: 29 }

  - tyden: 11
    dny:
      po:
        typ: beh
        kroky:
          - { krok: beh, cas_min: 60, popis: "volný běh", cil: "průměrná SF 120 tep/min" }
      ut:
        typ: silovy
        cviky:
          - { cvik: shyb_negativni_plus_klik, popis: "10x negativní shyb (3 s brzdit, dosažná hrazda) + 10x dynamický klik", serie: "3-5", pauza_s: 60 }
          - { krok: pauza, cas_min: "2-3" }
          - { cvik: vis_pritahovani_kolen_plus_lehsed, popis: "5x vis na hrazdě s přitahováním kolen k hrudníku + 10x leh-sed", serie: "3-5", pauza_s: 60 }
      st: { typ: aktivni_odpocinek, popis: "např. turistika, kolo, plavání" }
      ct: { typ: volno }
      pa:
        typ: kombinace
        podtyp: hiit_beh_sila
        kola: "2-3"
        pauza_mezi_koly_s: 180
        kroky_pred: "15 min rozklusání, ABECEDA, dynamické protažení"
        bloky:
          - { popis: "1 min leh-sed, 1 min pauza, 1 min leh-sed, 30 s běh na 100 %" }
          - { popis: "30 s klik, 30 s pauza, 30 s klik, 30 s běh na 100 %" }
      so:
